<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Custom Style + Rivers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />


    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        .popup-content {
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }

        #controls{
            position:absolute;
            top:10px;
            left:10px;
            background:white;
            padding:10px;
            border-radius:6px;
            font-family:sans-serif;
        }

        #sliderContainer{
            margin-top:6px;
        }

    </style>
</head>
<body>
<div id="map"></div>
<div id="controls">
    <button id="toggleDate">Toggle date</button>
    <button id="toggleSlider">Toggle slider</button>
    <div id="sliderContainer">
        <input id="yearSlider" type="range" min="450" max="1501" value="1501">
        <span id="yearValue">1501</span>
    </div>
</div>

<script>
    const map = new maptilersdk.Map({
        container: 'map',
        style: "https://api.maptiler.com/maps/019cdf37-7e26-7bfc-83ca-a9830271c196/style.json?key=FhcDkqNMFIcyWPy2YFCD",
        center: [37.6173, 55.7558],
        zoom: 6
    });

    let showDate = false;
    let sliderVisible = true;
    map.on('load', () => {
        map.addSource("rivers-lakes-towns", {
            type: "vector",
            url: "https://api.maptiler.com/tiles/019cde3f-4af8-7815-968c-1f00aff82036/tiles.json?key=FhcDkqNMFIcyWPy2YFCD"
        });

        map.addLayer({
            "id": "rivers6",
            "type": "line",
            "source": "rivers-lakes-towns",
            "layout": {},
            "paint": {
                "line-color": "hsl(114,100%,32%)",
                "line-width": 5
            },
            "source-layer": "rivers6"
        });
        map.addLayer({
                "id": "rivers5",
                "type": "line",
                "source": "rivers-lakes-towns",
                "layout": {},
                "paint": {
                    "line-color": "hsl(0, 100%, 50%)",
                    "line-width": 3
                },
                "source-layer": "rivers5"
        });

        map.addLayer({
            "id": "rivers6-titles",
            "type": "symbol",
            "source": "rivers-lakes-towns",
            "layout": {
                "text-field": [
                    "coalesce",
                    [
                        "get",
                        "name:ru"
                    ],
                    [
                        "get",
                        "name"
                    ]
                ],
                "text-font": [
                    "Noto Sans Regular"
                ],
                "visibility": "visible",
                "text-size": 18
            },
            "paint": {
                "text-color": "hsl(120,100%,50%)",
                "icon-halo-color": "rgba(255, 255, 255, 1)",
                "text-halo-color": "hsla(0, 0%, 100%, 0.61)",
                "icon-halo-width": 1,
                "text-halo-width": 100
            },
            "source-layer": "rivers6"
        });
        map.addLayer({
            "id": "rivers5-titles",
            "type": "symbol",
            "source": "rivers-lakes-towns",
            "layout": {
                "text-field": [
                    "coalesce",
                    [
                        "get",
                        "name:ru"
                    ],
                    [
                        "get",
                        "name"
                    ]
                ],
                "text-font": [
                    "Noto Sans Regular"
                ],
                "visibility": "visible",
                "text-size": 18
            },
            "paint": {
                "text-color": "hsl(0, 100%, 50%)",
                "icon-halo-color": "rgba(255, 255, 255, 1)",
                "text-halo-color": "hsla(0, 0%, 100%, 0.61)",
                "icon-halo-width": 1,
                "text-halo-width": 100
            },
            "source-layer": "rivers5"
        });


        map.addLayer({
            "id": "lakes-titles",
            "type": "symbol",
            "source": "rivers-lakes-towns",
            "layout": {
                "text-field": [
                    "coalesce",
                    [
                        "get",
                        "name:ru"
                    ],
                    [
                        "get",
                        "name"
                    ]
                ],
                "text-font": [
                    "Noto Sans Regular"
                ],
                "visibility": "visible",
                "text-size": 18
            },
            "paint": {
                "text-color": "hsl(237,100%,50%)",
                "icon-halo-color": "rgba(255, 255, 255, 1)",
                "text-halo-color": "hsla(0, 0%, 100%, 0.61)",
                "icon-halo-width": 1,
                "text-halo-width": 100
            },
            "source-layer": "lakes"
        });


        map.addLayer({
            "id": "towns-titles",
            "type": "symbol",
            "source": "rivers-lakes-towns",
            "layout": {
                "text-field": [
                    "case",
                    ["boolean", ["literal", showDate], false],
                    [
                        "format",
                        [
                            "coalesce",
                            ["get","name:ru"],
                            ["get","name"]
                        ],
                        {},
                        "\n",
                        {},
                        ["get","date"],
                        {"font-scale":0.8}
                    ],
                    [
                        "coalesce",
                        ["get","name:ru"],
                        ["get","name"]
                    ]
                ],
                "text-font": [
                    "Noto Sans Regular"
                ],
                "visibility": "visible",
                "text-size": 18
            },
            "paint": {
                "text-color":[
                    "interpolate",
                    ["linear"],
                    ["get","date"],
                    450,"#2c7bb6",
                    800,"#abd9e9",
                    1100,"#ffffbf",
                    1300,"#fdae61",
                    1501,"#d7191c"
                ],
                "icon-halo-color": "rgba(255, 255, 255, 1)",
                "text-halo-color": "hsla(0, 0%, 100%, 0.61)",
                "icon-halo-width": 1,
                "text-halo-width": 100
            },
            "source-layer": "towns"
        });



    });
</script>

</body>
</html>
