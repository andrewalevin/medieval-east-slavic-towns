<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Highlight River</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    maptilersdk.config.apiKey = "FhcDkqNMFIcyWPy2YFCD";

    const map = new maptilersdk.Map({
        container: 'map',
        style: 'https://api.maptiler.com/maps/019cdf37-7e26-7bfc-83ca-a9830271c196/style.json?key=FhcDkqNMFIcyWPy2YFCD',
        center: [37.6173, 55.7558],
        zoom: 6
    });

    map.on('load', () => {
        map.addSource("rivers-lakes-towns", {
            type: "vector",
            url: "https://api.maptiler.com/tiles/019cf2b3-6029-74f2-bd67-46939a21645e/tiles.json?key=FhcDkqNMFIcyWPy2YFCD"
        });

        const layersToAdd = [
            {
                id: "rivers4", type: "line", "source-layer": "rivers4",
                layout: { "line-join": "round" },
                paint: {
                    "line-color": "hsl(264, 100%, 50%)",
                    "line-width": ["interpolate", ["zoom"], 4, 0, 10, 2.5]
                }
            },
            {
                id: "rivers3", type: "line", "source-layer": "rivers3",
                layout: {},
                paint: {
                    "line-color": "hsl(197, 100%, 46%)",
                    "line-width": ["interpolate", ["zoom"], 5, 0.25, 9, 2]
                }
            }
        ];

        layersToAdd.forEach(l => map.addLayer({...l, source: "rivers-lakes-towns"}));

        // Создаём отдельный слой для подсветки линии
        map.addLayer({
            id: 'hover-line',
            type: 'line',
            source: {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] } // пусто пока
            },
            paint: {
                'line-color': '#ff0000',
                'line-width': 6
            }
        });

        map.on('mousemove', (e) => {
            const layers = ["rivers4", "rivers3"];
            let feature = null;

            for (let layer of layers) {
                const features = map.queryRenderedFeatures(e.point, { layers: [layer] });
                if (features.length) {
                    feature = features[0];
                    break;
                }
            }

            if (feature) {
                map.getSource('hover-line').setData(feature); // подсвечиваем только эту линию
            } else {
                map.getSource('hover-line').setData({ type: 'FeatureCollection', features: [] });
            }
        });
    });
</script>
</body>
</html>
