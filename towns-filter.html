<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Towns by foundation year</title>

  <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    .slider-container{
      position:absolute;
      top:10px;
      left:10px;
      background:white;
      padding:10px;
      border-radius:6px;
      font-family:sans-serif;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="slider-container">
  <div>Year: <span id="year">1500</span></div>
  <input id="slider" type="range" min="401" max="1500" step="1" value="1500">
</div>

<script>

  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://api.maptiler.com/maps/019cc0a1-ec33-70c4-9e08-2667d95462a6/style.json?key=PE20FyKz0o7ecOlmKKZe',
    center: [20,50],
    zoom:4
  });

  map.on('load', () => {

    map.addSource('towns', {
      type: 'vector',
      url: 'https://api.maptiler.com/tiles/019cc095-468f-7785-9d3b-329f62770f60/tiles.json?key=PE20FyKz0o7ecOlmKKZe'
    });

    map.addLayer({
      id:'towns-points',
      type:'circle',
      source:'towns',
      'source-layer':'towns',
      paint:{
        'circle-radius':3,
        'circle-color':'#ff0000'
      }
    });

    map.addLayer({
      id:'towns-labels',
      type:'symbol',
      source:'towns',
      'source-layer':'towns',
      layout:{
        'text-field':['get','title'],
        'text-size':10,
        'text-offset':[0,1.2]
      },
      paint:{
        'text-color':'#111'
      }
    });

  });

  const slider = document.getElementById('slider');
  const yearLabel = document.getElementById('year');

  slider.addEventListener('input', function(){

    const year = parseInt(this.value);
    yearLabel.textContent = year;

    map.setFilter('towns-points',
            ['<=',['get','date'],year]
    );

    map.setFilter('towns-labels',
            ['<=',['get','date'],year]
    );

  });

</script>

</body>
</html>
