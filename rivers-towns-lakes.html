<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Rivers Towns Lakes</title>
    <link rel="icon" type="image/x-icon" href="favicons/church-solo-favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/church-solo-favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/church-solo-favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/church-solo-favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicons/church-solo-favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicons/church-solo-favicon/android-chrome-512x512.png">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        .maplibregl-ctrl * { font-size: 1rem; }

        #year-slider-container {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(3px);
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: 6px 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            font-family: sans-serif;

            box-sizing: border-box;
            width: 80%;
            max-width: 600px;
            margin: 0 auto 1rem;
        }

        #year-slider{
            width:100%;
            height:18px;
        }

        #year-value{
            text-align:center;
            font-size:14px;
        }


        .popup-title{
            text-align:center;
            font-size:17px;
            font-weight:600;
        }

        .popup-date{
            text-align:center;
            font-size:14px;
            margin-bottom:6px;
        }

        .popup-links{
            text-align:center;
            margin:6px 0 8px 0;
        }

        .popup-links a{
            display:block;
            font-size:13px;
            word-break:break-word;
        }

        .popup-img{
            width:100%;
            height:auto;
            margin-bottom:8px;
        }

        .popup-links p{
            margin:3px 0;
            font-size:13px;
            text-align:center;
        }

        .popup-table{
            font-size:12px;
            border-collapse:collapse;
            width:100%;
        }

        .popup-table td{
            border:1px solid #ccc;
            padding:3px;
        }

        #near-towns{
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(3px);
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: .75rem 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            font-family: sans-serif;
            box-sizing: border-box;
            text-decoration: none;
            color: #757575;
        }

        #near-towns a {
            text-decoration: none;
            color: #8c0042;
        }


    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = new maptilersdk.Map({
        container: 'map',
        style: 'https://api.maptiler.com/maps/019cf74c-fbd0-73ca-b739-e4cce594bfe4/style.json?key=FhcDkqNMFIcyWPy2YFCD',
        center: [37.6173, 55.7558],
        zoom: 6,
        navigationControl: false,
        terrainControl: false,
        scaleControl: false,
        geolocateControl: false
    });

    function createLayerToggleButton0(map, layers, emoji, elementIds = []) {
        let visible = true;

        const btn = document.createElement("button");
        btn.innerText = emoji;
        btn.type = "button";

        btn.style.transition = "filter 0.2s";
        btn.style.filter = "grayscale(0%)";

        if (!Array.isArray(elementIds)) {
            elementIds = [elementIds];
        }

        btn.onclick = () => {
            visible = !visible;

            // переключаем слои карты
            layers.forEach(id => {
                if (map.getLayer(id)) {
                    map.setLayoutProperty(id, "visibility", visible ? "visible" : "none");
                }
            });

            // переключаем элементы DOM
            elementIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.display = visible ? "" : "none";
                }
            });

            // визуальное состояние кнопки
            btn.style.filter = visible ? "grayscale(0%)" : "grayscale(100%)";
        };
        return btn;
    }

    function createLayerToggleButton(map, layers, emoji, elementIds = [], property = "visibility", values = ["visible", "none"], defaultState = true) {
        let active = defaultState;

        const btn = document.createElement("button");
        btn.innerText = emoji;
        btn.type = "button";

        btn.style.transition = "filter 0.2s";
        btn.style.filter = active ? "grayscale(0%)" : "grayscale(100%)";

        if (!Array.isArray(elementIds)) {
            elementIds = [elementIds];
        }

        // сразу применяем начальное состояние к слоям и DOM
        layers.forEach(id => {
            if (map.getLayer(id)) {
                map.setLayoutProperty(id, property, active ? values[0] : values[1]);
            }
        });
        elementIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = active ? "" : "none";
            }
        });

        btn.onclick = () => {
            active = !active;

            layers.forEach(id => {
                if (map.getLayer(id)) {
                    map.setLayoutProperty(id, property, active ? values[0] : values[1]);
                }
            });
            elementIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.display = active ? "" : "none";
                }
            });

            btn.style.filter = active ? "grayscale(0%)" : "grayscale(100%)";
        };

        return btn;
    }

    class ZoomControl {
        onAdd(map) {
            this._map = map;
            this._container = document.createElement('div');
            this._container.className = 'maplibregl-ctrl maplibregl-ctrl-group';

            this._zoomDisplay = document.createElement('button');
            this._zoomDisplay.type = 'button';
            this._zoomDisplay.innerText = map.getZoom().toFixed(1);
            this._zoomDisplay.style.textAlign = 'center';
            this._container.appendChild(this._zoomDisplay);
            map.on('zoomend', () => { this._zoomDisplay.innerText = map.getZoom().toFixed(1); });

            const natureBtn = createLayerToggleButton(map, [
                "Vegetation", "Scrub", "Wood", "Forest", "Grass",
                "Sand", "Glacier", "River", "Waterway", "Lake"
            ], "🗺");
            this._container.appendChild(natureBtn);

            const labelsBtn = createLayerToggleButton(map, [
                "Continent labels", "Capital city labels", "City labels",
                "Town labels", "Village labels", "Place labels"
            ], "🌆");
            this._container.appendChild(labelsBtn);

            const riversBtn = createLayerToggleButton(map, [
                "Rivers6", "Rivers5", "Rivers4",
                "Rivers3", "Rivers2", "Rivers1"
            ], "🛶");
            this._container.appendChild(riversBtn);

            const riversTitleBtn = createLayerToggleButton(map, [
                "Rivers6-titles", "Rivers5-titles", "Rivers4-titles",
                "Rivers3-titles", "Rivers2-titles", "Rivers1-titles"
            ], "🔷");
            this._container.appendChild(riversTitleBtn);

            const lakesBtn = createLayerToggleButton(map, ["Lakes-titles"], "🔵");
            this._container.appendChild(lakesBtn);

            const townsBtn = createLayerToggleButton(map, ["Towns-titles"], "🏰", ['year-slider-container']);
            this._container.appendChild(townsBtn);

            const townsDateBtn = createLayerToggleButton(map, ["Towns-titles"], "🎩", [], "text-field",
                [
                    ["coalesce", ["get", "name:ru"], ["get", "name"]],
                    [
                        "format", ["coalesce", ["get", "name:ru"], ["get", "name"]],
                        { "font-scale": 1 }, "\n", {},
                        ["case", ["boolean", ["get", "showDate"], true], ["get", "date"], ""],
                        { "font-scale": 0.9 }
                    ]
                ], false);
            this._container.appendChild(townsDateBtn);

            const citiesMedievalBtn = createLayerToggleButton(map, ["Cities-medieval"], "🏺",
                ['near-towns'], 'visibility', ["visible", "none"], false
            );
            this._container.appendChild(citiesMedievalBtn);


            const matchedTownsBtn = createLayerToggleButton(map, ["Matched-towns", "Matched-towns-lines"], "🌈️",
                [], 'visibility', ["visible", "none"], false
            );
            this._container.appendChild(matchedTownsBtn);

            return this._container;
        }
        onRemove() {
            this._container.parentNode.removeChild(this._container);
            this._map = undefined;
        }
    }

    map.addControl(new ZoomControl(), 'top-right');

    async function createPropertiesPopup(feature, lngLat){
        const props = feature.properties || {};
        const name = props["name:ru"] || props["name"] || "";
        let html = "";
        let imageHTML = "";
        if(props.wikidata){
            try{
                const res = await fetch(
                    `https://www.wikidata.org/wiki/Special:EntityData/${props.wikidata}.json`
                );
                const data = await res.json();
                const entity = data.entities[props.wikidata];
                const img = entity.claims.P18?.[0]?.mainsnak?.datavalue?.value;
                if(img){
                    const imgName = encodeURIComponent(img.replace(/ /g,"_"));
                    imageHTML =
                        `<img
                src="https://commons.wikimedia.org/wiki/Special:FilePath/${imgName}?width=300"
                class="popup-img">`;
                }
            }catch(e){}
        }

        html += imageHTML;
        html += `<div class="popup-title">${name}</div>`;
        if(props.date){
            html += `<div class="popup-date">${props.date}</div>`;
        }

        let linksHTML = "";
        Object.keys(props).forEach(k=>{
            if(k.startsWith("wikipedia")){
                const val = props[k];
                const [lang,page] = val.split(":");
                const encodedURL =
                    `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(page)}`;
                const displayURL =
                    `https://${lang}.wikipedia.org/wiki/${page}`;
                linksHTML +=
                    `<p><a href="${encodedURL}" target="_blank">${displayURL}</a></p>`;
            }
        });

        if(props.wikidata){
            const url = `https://www.wikidata.org/wiki/${props.wikidata}`;
            linksHTML += `<p><a href="${url}" target="_blank">${url}</a></p>`;
        }

        if(linksHTML){
            html += `<div class="popup-links">${linksHTML}</div>`;
        }

        html += "<table style='font-size:12px;border-collapse:collapse'>";
        for(const key in props){
            html+=`
                <tr>
                    <td style="border:1px solid #ccc;padding:3px;font-weight:bold">${key}</td>
                    <td style="border:1px solid #ccc;padding:3px">${props[key]}</td>
                </tr>`;
        }
        html += "</table>";

        new maptilersdk.Popup({
            maxWidth:"360px"
        })
            .setLngLat(lngLat)
            .setHTML(html)
            .addTo(map);
    }

    map.on('load', () => {
        map.setLayoutProperty('Cities-medieval', 'visibility', 'none');

        const clickableLayers = [
            "Rivers6","Rivers5","Rivers4","Rivers3","Rivers2","Rivers1",
            "Rivers6-titles","Rivers5-titles","Rivers4-titles","Rivers3-titles","Rivers2-titles","Rivers1-titles",
            "Lakes-titles",
            "Towns-titles",
            'Cities-medieval',
            'Matched-towns'
        ];

        clickableLayers.forEach(layer => {
            map.on("click", layer, (e) => {
                const feature = e.features[0];
                createPropertiesPopup(feature, e.lngLat);
            });
            map.on("mouseenter", layer, () => {
                map.getCanvas().style.cursor = "pointer";
            });
            map.on("mouseleave", layer, () => {
                map.getCanvas().style.cursor = "";
            });
        });

        const slider = document.getElementById("year-slider");
        const yearValue = document.getElementById("year-value");
        slider.addEventListener("input", () => {
            const year = parseInt(slider.value);
            yearValue.innerText = year;
            map.setFilter("Towns-titles", ["<=", ["to-number", ["get", "date"]], year]);
        });

    });

</script>
<div id="year-slider-container">
    <input type="range" id="year-slider" min="450" max="1501" value="1501" step="1">
    <div id="year-value">1501</div>
</div>

<div id="near-towns" style="display: none;">
    <a target="_blank" href="https://ru.wikipedia.org/wiki/%D0%A1%D0%BF%D0%B8%D1%81%D0%BE%D0%BA_%D1%80%D1%83%D1%81%D1%81%D0%BA%D0%B8%D1%85_%D0%B3%D0%BE%D1%80%D0%BE%D0%B4%D0%BE%D0%B2_%D0%B4%D0%B0%D0%BB%D1%8C%D0%BD%D0%B8%D1%85_%D0%B8_%D0%B1%D0%BB%D0%B8%D0%B6%D0%BD%D0%B8%D1%85">
        Список русских городов дальних и ближних
    </a>
</div>

</body>
</html>
